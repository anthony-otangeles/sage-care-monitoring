<!doctype html><html><head><meta charset="utf-8"><title>Inputs</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;background:#fff;font-family:Inter;color:#1C192E;max-width:640px}
.f{margin-bottom:18px}
.f label{display:block;font-size:14px;font-weight:600;color:#6A7282;margin-bottom:12px}
.sb{display:flex;align-items:center;gap:12px;border:1px solid #E5E7EB;border-radius:5px;padding:14px 15px;height:48px;box-sizing:border-box}
.sb input{border:0;outline:0;flex:1;font:14px Inter;color:#1C192E}
.sb input::placeholder{color:#99A1AF}
.sb.focus{border-color:#845EC2}
.sb.error{border-color:#FF6E6C}
.help{font-size:12px;color:#FF6E6C;margin-top:6px}</style></head><body>
<div class="f"><label>Email Address</label>
  <div class="sb"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#99A1AF" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg><input placeholder="you@company.com"></div>
</div>
<div class="f"><label>Password</label>
  <div class="sb focus"><input type="password" value="••••••••••••"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#6A7282" stroke-width="2"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z"/><circle cx="12" cy="12" r="3"/></svg></div>
</div>
<div class="f"><label>Patient MRN</label>
  <div class="sb error"><input value="0034-77Q"></div>
  <div class="help">MRN must be numeric.</div>
</div>
</body></html>
