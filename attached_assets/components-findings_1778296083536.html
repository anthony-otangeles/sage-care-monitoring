<!doctype html><html><head><meta charset="utf-8"><title>Finding Toggles</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;background:#fff;font-family:Inter;color:#1C192E}
.row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.lbl{font-size:11px;color:#6A7282;font-family:JetBrains Mono;width:120px}
.f{display:flex;align-items:center;gap:8px;padding:6px 12px;border-radius:9999px;font-size:13px;font-weight:600}
.pos{background:#E7F5EF;color:#29BB89}
.neg{background:#F5F2FD;color:#67568C}
.warn{background:#FFF3EF;color:#FF6E6C}
.dot{width:8px;height:8px;border-radius:9999px;background:currentColor}</style></head><body>
<div class="row"><span class="lbl">Present/Pos</span>
  <span class="f pos"><span class="dot"></span>Chest pain</span>
  <span class="f pos"><span class="dot"></span>Cough, productive</span>
</div>
<div class="row"><span class="lbl">Present/Neg</span>
  <span class="f neg"><span class="dot"></span>Dyspnea · denies</span>
  <span class="f neg"><span class="dot"></span>Edema · denies</span>
</div>
<div class="row"><span class="lbl">Absent/Pos</span>
  <span class="f warn"><span class="dot"></span>Reports fever</span>
  <span class="f warn"><span class="dot"></span>Reports nausea</span>
</div>
<div class="row"><span class="lbl">Laterality</span>
  <span class="f" style="background:#F5F2FD;color:#67568C">Bilateral</span>
  <span class="f" style="background:#fff;color:#6A7282;border:1px solid #E5E7EB">Left</span>
  <span class="f" style="background:#fff;color:#6A7282;border:1px solid #E5E7EB">Right</span>
</div>
</body></html>
