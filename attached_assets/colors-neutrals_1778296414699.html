<!doctype html><html><head><meta charset="utf-8"><title>Colors · Neutrals</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:#fff;font-family:var(--km-font-sans);color:var(--km-fg-1)}
  .row{display:flex;gap:12px;flex-wrap:wrap}
  .sw{flex:1 1 140px;min-width:130px;border-radius:8px;overflow:hidden;border:1px solid var(--km-border)}
  .chip{height:60px}
  .meta{padding:8px 10px;font-size:12px;line-height:16px}
  .name{font-weight:600}
  .hex{color:var(--km-fg-2);font-family:var(--km-font-mono);font-size:11px}
</style></head><body>
<div class="row">
  <div class="sw"><div class="chip" style="background:#1C192E"></div><div class="meta"><div class="name" style="color:#fff;background:#1C192E;margin:-8px -10px 4px;padding:4px 10px">fg-1 Body</div><div class="hex">#1C192E</div></div></div>
  <div class="sw"><div class="chip" style="background:#6A7282"></div><div class="meta"><div class="name">fg-2 Secondary</div><div class="hex">#6A7282</div></div></div>
  <div class="sw"><div class="chip" style="background:#99A1AF"></div><div class="meta"><div class="name">fg-3 Placeholder</div><div class="hex">#99A1AF</div></div></div>
  <div class="sw"><div class="chip" style="background:#D1D5DC"></div><div class="meta"><div class="name">Border strong</div><div class="hex">#D1D5DC</div></div></div>
  <div class="sw"><div class="chip" style="background:#E5E7EB"></div><div class="meta"><div class="name">Border</div><div class="hex">#E5E7EB</div></div></div>
  <div class="sw"><div class="chip" style="background:#EEEEEE"></div><div class="meta"><div class="name">Divider</div><div class="hex">#EEEEEE</div></div></div>
  <div class="sw"><div class="chip" style="background:#F7F7F7;border-bottom:1px solid #E5E7EB"></div><div class="meta"><div class="name">Canvas</div><div class="hex">#F7F7F7</div></div></div>
  <div class="sw"><div class="chip" style="background:#F8F8F8;border-bottom:1px solid #E5E7EB"></div><div class="meta"><div class="name">Hover</div><div class="hex">#F8F8F8</div></div></div>
  <div class="sw"><div class="chip" style="background:#F9FAFB;border-bottom:1px solid #E5E7EB"></div><div class="meta"><div class="name">Surface Alt</div><div class="hex">#F9FAFB</div></div></div>
  <div class="sw"><div class="chip" style="background:#FFFFFF;border-bottom:1px solid #E5E7EB"></div><div class="meta"><div class="name">Surface</div><div class="hex">#FFFFFF</div></div></div>
</div>
</body></html>
