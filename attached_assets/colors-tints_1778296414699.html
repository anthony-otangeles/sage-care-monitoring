<!doctype html><html><head><meta charset="utf-8"><title>Colors · Semantic tints</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:#fff;font-family:var(--km-font-sans);color:var(--km-fg-1)}
  .row{display:flex;gap:12px;flex-wrap:wrap}
  .card{flex:1 1 160px;min-width:150px;border-radius:8px;padding:14px;font-size:13px}
  .card .name{font-weight:600;font-size:13px}
  .card .hex{font-family:var(--km-font-mono);font-size:11px;margin-top:4px;opacity:.8}
  .card .use{font-size:11px;margin-top:6px;opacity:.75}
</style></head><body>
<div class="row">
  <div class="card" style="background:#F5F2FD;color:#67568C"><div class="name">Lavender tint</div><div class="hex">#F5F2FD</div><div class="use">TO DO, neutral status</div></div>
  <div class="card" style="background:#FFF3EF;color:#FF6E6C"><div class="name">Coral tint</div><div class="hex">#FFF3EF</div><div class="use">FOR REVIEW, warning</div></div>
  <div class="card" style="background:#FFF3F8;color:#C34A7D"><div class="name">Pink tint</div><div class="hex">#FFF3F8</div><div class="use">FOR SIGNING, vitals</div></div>
  <div class="card" style="background:#E7F5EF;color:#29BB89"><div class="name">Mint tint</div><div class="hex">#E7F5EF</div><div class="use">SIGNED, success</div></div>
  <div class="card" style="background:#FFF8E6;color:#B58420"><div class="name">Gold tint</div><div class="hex">#FFF8E6</div><div class="use">PENDING</div></div>
</div>
</body></html>
