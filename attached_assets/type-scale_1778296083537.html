<!doctype html><html><head><meta charset="utf-8"><title>Type · Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:#fff;font-family:var(--km-font-sans);color:var(--km-fg-1)}
  .row{display:flex;align-items:baseline;gap:16px;padding:10px 0;border-bottom:1px solid var(--km-divider)}
  .row:last-child{border:0}
  .tag{min-width:120px;font-size:12px;color:var(--km-fg-2);font-family:var(--km-font-mono)}
  .demo{flex:1;color:var(--km-fg-1)}
</style></head><body>
<div class="row"><div class="tag">30 / 700</div><div class="demo" style="font-size:30px;font-weight:700;line-height:100%;color:#845EC2">Hi, John!</div></div>
<div class="row"><div class="tag">24 / 700</div><div class="demo" style="font-size:24px;font-weight:700;line-height:100%">New Admissions</div></div>
<div class="row"><div class="tag">16 / 700</div><div class="demo" style="font-size:16px;font-weight:700">Patient Schedules</div></div>
<div class="row"><div class="tag">14 / 600</div><div class="demo" style="font-size:14px;font-weight:600;color:#6A7282">Email Address</div></div>
<div class="row"><div class="tag">14 / 400</div><div class="demo" style="font-size:14px">Select a facility you want to view:</div></div>
<div class="row"><div class="tag">12 / 600</div><div class="demo" style="font-size:12px;font-weight:600;letter-spacing:.02em">FOR REVIEW</div></div>
<div class="row"><div class="tag">12 / 400</div><div class="demo" style="font-size:12px;color:#6A7282">MRN 0034-772 · Admitted Apr 14</div></div>
</body></html>
