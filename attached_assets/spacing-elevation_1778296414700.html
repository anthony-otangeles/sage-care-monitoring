<!doctype html><html><head><meta charset="utf-8"><title>Spacing · Elevation</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:32px;background:#F7F7F7;font-family:var(--km-font-sans);color:var(--km-fg-1)}
  .row{display:flex;gap:24px;flex-wrap:wrap}
  .card{flex:1 1 180px;min-width:170px;min-height:80px;background:#fff;border-radius:12px;padding:14px;font-size:12px;color:var(--km-fg-2)}
  .card .n{font-weight:600;color:var(--km-fg-1);font-size:13px;margin-bottom:4px}
  .s0{box-shadow:none;border:1px solid var(--km-border)}
  .s1{box-shadow:0 1px 2px -1px rgba(0,0,0,.1),0 1px 3px 0 rgba(0,0,0,.1)}
  .s2{box-shadow:0 4px 6px -1px rgba(0,0,0,.10), 0 2px 4px -2px rgba(0,0,0,.10)}
  .s3{box-shadow:0 10px 15px -3px rgba(0,0,0,.10), 0 4px 6px -4px rgba(0,0,0,.10)}
</style></head><body>
<div class="row">
  <div class="card s0"><div class="n">shadow-none</div>Border does elevation</div>
  <div class="card s1"><div class="n">shadow-sm</div>Default card / login</div>
  <div class="card s2"><div class="n">shadow-md</div>Dropdowns / popover</div>
  <div class="card s3"><div class="n">shadow-lg</div>Modals</div>
</div>
</body></html>
