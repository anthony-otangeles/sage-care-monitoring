<!doctype html><html><head><meta charset="utf-8"><title>Spacing · Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:#fff;font-family:var(--km-font-sans);color:var(--km-fg-1)}
  .row{display:flex;align-items:center;gap:14px;padding:6px 0;font-size:12px}
  .bar{background:#845EC2;height:14px;border-radius:2px}
  .lbl{min-width:72px;color:var(--km-fg-2);font-family:var(--km-font-mono)}
  .name{color:var(--km-fg-1)}
</style></head><body>
<div class="row"><div class="lbl">4px</div><div class="bar" style="width:4px"></div><div class="name">s-1 · icon-text</div></div>
<div class="row"><div class="lbl">8px</div><div class="bar" style="width:8px"></div><div class="name">s-2 · chip gap</div></div>
<div class="row"><div class="lbl">12px</div><div class="bar" style="width:12px"></div><div class="name">s-3 · row gap (default)</div></div>
<div class="row"><div class="lbl">16px</div><div class="bar" style="width:16px"></div><div class="name">s-4 · card padding</div></div>
<div class="row"><div class="lbl">24px</div><div class="bar" style="width:24px"></div><div class="name">s-5 · section gap</div></div>
<div class="row"><div class="lbl">32px</div><div class="bar" style="width:32px"></div><div class="name">s-6 · panel padding</div></div>
<div class="row"><div class="lbl">64px</div><div class="bar" style="width:64px"></div><div class="name">s-8 · hero gap</div></div>
</body></html>
